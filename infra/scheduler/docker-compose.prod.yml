services:
  ofelia:
    volumes:
      - ./ofelia.prod.ini:/etc/ofelia/config.ini:ro
    healthcheck:
      test: ["CMD", "pgrep", "ofelia"]
      interval: 30s
      timeout: 5s
      retries: 3

  backup-worker:
    build:
      context: .
      dockerfile: Dockerfile.backup
    restart: unless-stopped
    labels:
      - "habita.role=backup-worker"
    env_file:
      - ../.env.prod
    environment:
      AGE_PUBLIC_KEY: ${AGE_PUBLIC_KEY:-age1s29vyugtakkf2lmj38jxgqssf044j2gh6fg47yx48hh8hazz0vuspj8ayx}
      PGHOST: db
      PGPORT: 5432
    volumes:
      - backups:/backups
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
        reservations:
          memory: 128M
          cpus: "0.1"
    networks:
      - internal

  backup-uploader:
    image: rclone/rclone:1.68
    restart: unless-stopped
    labels:
      - "habita.role=backup-uploader"
    entrypoint: ["tail", "-f", "/dev/null"]
    volumes:
      - backups:/backups
      - ./rclone.conf:/config/rclone/rclone.conf:ro
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"
        reservations:
          memory: 64M
          cpus: "0.05"
    networks:
      - internal

volumes:
  backups:
    external: true
