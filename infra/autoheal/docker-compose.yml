services:
  autoheal:
    image: willfarrell/autoheal:latest
    restart: unless-stopped
    labels:
      - "habita.role=autoheal"
    environment:
      AUTOHEAL_CONTAINER_LABEL: all
      AUTOHEAL_INTERVAL: 30
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: "0.1"
        reservations:
          memory: 32M
          cpus: "0.05"
    networks:
      - internal

networks:
  internal:
    external: true
