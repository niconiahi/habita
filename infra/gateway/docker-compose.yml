services:
  caddy:
    image: caddy:2.8
    restart: unless-stopped
    ports:
      - "80:80/tcp"
      - "443:443/tcp"
      - "443:443/udp"
    healthcheck:
      test: ["CMD", "pidof", "caddy"]
      interval: 10s
      timeout: 5s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    networks:
      - internal

networks:
  internal:
    external: true
