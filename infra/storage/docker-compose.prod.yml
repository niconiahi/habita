services:
  db:
    env_file:
      - ../.env.prod
    environment:
      # wal-g R2 config
      WALG_S3_PREFIX: s3://habita-backup/wal-g
      AWS_ENDPOINT: https://$$CLOUDFLARE_ACCOUNT_ID.r2.cloudflarestorage.com
      AWS_REGION: auto
      AWS_S3_FORCE_PATH_STYLE: "true"
      # AWS_ACCESS_KEY_ID and AWS_SECRET_ACCESS_KEY come from .env.prod
    command:
      - postgres
      - -c
      - archive_mode=on
      - -c
      - archive_command=/bin/bash /wal-archive.sh %p %f
      - -c
      - archive_timeout=60
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "2.0"
        reservations:
          memory: 512M
          cpus: "0.5"

  kv:
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
        reservations:
          memory: 256M
          cpus: "0.1"

  object:
    env_file:
      - ../.env.prod
    environment:
      RUSTFS_CONSOLE_ENABLE: "false"
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "2.0"
        reservations:
          memory: 512M
          cpus: "0.5"
