services:
  db:
    platform: linux/amd64
    env_file:
      - ../.env.dev
    ports:
      - "5432:5432"
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
        reservations:
          memory: 512M
          cpus: "0.25"

  kv:
    ports:
      - "6379:6379"
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
        reservations:
          memory: 128M
          cpus: "0.1"

  object:
    env_file:
      - ../.env.dev
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      RUSTFS_CONSOLE_ENABLE: "true"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 256M
          cpus: "0.25"
