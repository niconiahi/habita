services:
  telemetry-db:
    image: clickhouse/clickhouse-server:24.1.2-alpine
    restart: unless-stopped
    labels:
      habita.role: telemetry-db
    volumes:
      - telemetry_db:/var/lib/clickhouse/
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://0.0.0.0:8123/ping"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    networks:
      - internal

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.98.0
    restart: unless-stopped
    labels:
      habita.role: otel-collector
    command: --config=/etc/otelcol-contrib/config.yaml
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro
    depends_on:
      telemetry-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:13133/"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    networks:
      - internal

  observability-ui:
    restart: unless-stopped
    labels:
      habita.role: observability-ui
    environment:
      CLICKHOUSE_URL: http://telemetry-db:8123
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3001/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    networks:
      - internal

volumes:
  telemetry_db:

networks:
  internal:
    external: true
