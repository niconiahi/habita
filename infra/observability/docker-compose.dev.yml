services:
  telemetry-db:
    ports:
      - "8123:8123"
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
        reservations:
          memory: 512M
          cpus: "0.25"

  otel-collector:
    ports:
      - "4318:4318"
    volumes:
      - ./otel-collector-config.dev.yaml:/etc/otelcol-contrib/config.yaml:ro
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
        reservations:
          memory: 128M
          cpus: "0.1"

  observability-ui:
    build:
      context: ../../apps/observability
      dockerfile: config/Dockerfile
      target: dev
      pull: false
      x-bake:
        provenance: false
    volumes:
      - ../../apps/observability:/app:delegated
      - observability_deps:/app/node_modules
      - ../gateway/certs:/certs:ro
    env_file:
      - ../.env.dev
    ports:
      - "5175:5175"
    environment:
      PORT: 5175
      BETTER_AUTH_URL: https://observability.dev.habita.rent
      OBS_POSTGRES_DB: observability
      OTEL_ENVIRONMENT: development
    healthcheck:
      test: ["CMD-SHELL", "NODE_TLS_REJECT_UNAUTHORIZED=0 node -e \"fetch('https://localhost:5175/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 256M
          cpus: "0.25"

volumes:
  observability_deps:
