services:
  telemetry-db:
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
        reservations:
          memory: 512M
          cpus: "0.5"

  otel-collector:
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
        reservations:
          memory: 128M
          cpus: "0.1"

  observability-ui:
    image: ${OBSERVABILITY_UI_IMAGE:?OBSERVABILITY_UI_IMAGE required}
    env_file:
      - ../.env.prod
    environment:
      PORT: 3001
      NODE_ENV: production
      BETTER_AUTH_URL: https://observability.habita.rent
      OBS_POSTGRES_DB: observability
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
        reservations:
          memory: 128M
          cpus: "0.1"
