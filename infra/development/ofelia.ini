[job-exec "create-escalation-jobs"]
schedule = 0 * * * * *
container = development-web-1
command = bun --cwd /apps/web run app/lib/cron/create_escalation_jobs.script.server.ts
no-overlap = true

[job-exec "process-jobs"]
schedule = 0 * * * * *
container = development-web-1
command = bun --cwd /apps/web run app/lib/cron/process_jobs.script.server.ts
no-overlap = true
