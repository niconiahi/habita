services:
  db:
    image: postgis/postgis:17-3.4
    restart: unless-stopped
    env_file:
      - ../.env
    ports:
      - "5432:5432"
    volumes:
      - web_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - web

  web:
    build:
      context: ../../../apps/web
      dockerfile: ../../infra/development/web/Dockerfile
      pull: false
      x-bake:
        provenance: false
    restart: unless-stopped
    volumes:
      - ../../../apps/web:/apps/web:delegated
      - web_deps:/apps/web/node_modules
    env_file:
      - ../.env
    ports:
      - "5174:5174"
    environment:
      PORT: 5174
      DATABASE_URL: postgres://$$POSTGRES_USER:$$POSTGRES_PASSWORD@db:5432/$$POSTGRES_DB
      REDIS_URL: redis://valkey:6379
      OTEL_EXPORTER_OTLP_ENDPOINT: http://host.docker.internal:4318
      OTEL_SERVICE_NAME: web
      OTEL_ENVIRONMENT: development
      NODE_OPTIONS: --max-old-space-size=4096
    depends_on:
      db:
        condition: service_healthy
      valkey:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1G
    networks:
      - web

  valkey:
    image: valkey/valkey:7
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - valkey_data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - web

  go:
    build:
      context: ../../../apps/go
      dockerfile: Dockerfile
      pull: false
      x-bake:
        provenance: false
    restart: unless-stopped
    volumes:
      - ../../../apps/go:/apps/go
    env_file:
      - ../.env
    environment:
      PORT: 8081
      OTEL_EXPORTER_OTLP_ENDPOINT: http://host.docker.internal:4318
      OTEL_SERVICE_NAME: go
      OTEL_ENVIRONMENT: development
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD", "sh", "-lc", "curl -fsS http://localhost:8081/health || exit 1"]
      interval: 10s
      timeout: 2s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - web

  image:
    image: darthsim/imgproxy:latest
    restart: unless-stopped
    user: "0"
    env_file:
      - ../.env
    environment:
      IMGPROXY_USE_ETAG: "true"
      IMGPROXY_AUTO_WEBP: "true"
      IMGPROXY_ALLOW_LOOPBACK_SOURCE_ADDRESSES: "true"
    extra_hosts:
      - "dev.habita.rent:host-gateway"
    volumes:
      - ./certs/habita.pem:/usr/local/share/ca-certificates/habita.crt:ro
    command: sh -c "update-ca-certificates && imgproxy"
    depends_on:
      web:
        condition: service_started
    healthcheck:
      test: ["CMD", "imgproxy", "health"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - web

  caddy:
    image: caddy:2
    restart: unless-stopped
    depends_on:
      go:
        condition: service_healthy
      image:
        condition: service_healthy
      web:
        condition: service_started
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./certs/dev.habita.rent.pem:/etc/ssl/certs/dev.habita.rent.pem:ro
      - ./certs/dev.habita.rent-key.pem:/etc/ssl/private/dev.habita.rent-key.pem:ro
      - ./certs/habita.pem:/etc/ssl/certs/habita.pem:ro
    deploy:
      resources:
        limits:
          memory: 128M
    networks:
      - web

  nominatim:
    image: mediagis/nominatim:4.4
    ports:
      - "8090:8090"
    environment:
      - PBF_URL=https://download.geofabrik.de/south-america/argentina-latest.osm.pbf
      - REPLICATION_URL=https://download.geofabrik.de/south-america/argentina-updates/
      - IMPORT_WIKIPEDIA=false
      - IMPORT_US_POSTCODES=false
      - IMPORT_GB_POSTCODES=false
      - NOMINATIM_LISTEN_PORT=8090
    volumes:
      - nominatim_data:/var/lib/postgresql/14/main
    shm_size: 1gb
    deploy:
      resources:
        limits:
          memory: 8G
        reservations:
          memory: 4G
    networks:
      - web

  ofelia:
    image: mcuadros/ofelia:latest
    restart: unless-stopped
    depends_on:
      - web
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./ofelia.ini:/etc/ofelia/config.ini:ro
    command: daemon --config /etc/ofelia/config.ini
    deploy:
      resources:
        limits:
          memory: 64M
    networks:
      - web

networks:
  web:
    driver: bridge

volumes:
  web_data:
  web_deps:
  nominatim_data:
  valkey_data:
