[job-exec "create-escalation-jobs"]
schedule = 0 * * * * *
container = web-web-1
command = bun run --cwd /apps/web src/lib/server/cron/create_escalation_jobs.script.ts
no-overlap = true

[job-exec "process-jobs"]
schedule = 0 * * * * *
container = web-web-1
command = bun run --cwd /apps/web src/lib/server/cron/process_jobs.script.ts
no-overlap = true
