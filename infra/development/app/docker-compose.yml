services:
  svelte:
    build:
      context: ../../../apps/web
      dockerfile: Dockerfile
      target: dev
      pull: false
      x-bake:
        provenance: false
    restart: unless-stopped
    labels:
      - "habita.role=app"
    volumes:
      - ../../../apps/web:/app:delegated
      - deps:/app/node_modules
      - ../gateway/certs:/certs:ro
    env_file:
      - ../.env
    ports:
      - "5174:5174"
    environment:
      PORT: 5174
      DATABASE_URL: postgres://$$POSTGRES_USER:$$POSTGRES_PASSWORD@db:5432/$$POSTGRES_DB
      REDIS_URL: redis://kv:6379
      OTEL_EXPORTER_OTLP_ENDPOINT: https://api.axiom.co
      OTEL_EXPORTER_OTLP_HEADERS: Authorization=Bearer $$AXIOM_TOKEN,X-Axiom-Dataset=$$AXIOM_DATASET
      OTEL_SERVICE_NAME: svelte
      OTEL_ENVIRONMENT: development
      NODE_OPTIONS: --max-old-space-size=1536
      BROKER_BROKERS: redpanda:9092
    healthcheck:
      test: ["CMD-SHELL", "node -e \"process.env.NODE_TLS_REJECT_UNAUTHORIZED='0'; fetch('https://localhost:5174/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
        reservations:
          memory: 1G
          cpus: "0.5"
    networks:
      - internal

  # E2E test runner - uses official Playwright image
  # Run with: docker compose -p app run --rm test
  test:
    image: mcr.microsoft.com/playwright:v1.58.2-noble
    working_dir: /app
    volumes:
      - ../../../apps/web:/app:delegated
      - deps:/app/node_modules
    env_file:
      - ../.env
    environment:
      POSTGRES_HOST: db
    networks:
      - internal
    # Not a long-running service - runs tests and exits
    profiles:
      - test

networks:
  internal:
    external: true

volumes:
  deps:
