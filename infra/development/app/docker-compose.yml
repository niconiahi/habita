services:
  db:
    image: postgis/postgis:17-3.4
    restart: unless-stopped
    env_file:
      - ../.env
    labels:
      - "habita.role=database"
    ports:
      - "5432:5432"
    volumes:
      - db:/var/lib/postgresql/data
      - backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 256M
          cpus: "0.25"
    networks:
      - internal

  valkey:
    image: valkey/valkey:7.2
    restart: unless-stopped
    labels:
      - "habita.role=cache"
    ports:
      - "6379:6379"
    volumes:
      - kv:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
        reservations:
          memory: 128M
          cpus: "0.1"
    networks:
      - internal

  svelte:
    build:
      context: ../../../apps/web
      dockerfile: Dockerfile
      target: dev
      pull: false
      x-bake:
        provenance: false
    restart: unless-stopped
    labels:
      - "habita.role=app"
    volumes:
      - ../../../apps/web:/app:delegated
      - deps:/app/node_modules
      - ../gateway/certs:/certs:ro
    env_file:
      - ../.env
    ports:
      - "5174:5174"
    environment:
      PORT: 5174
      DATABASE_URL: postgres://$$POSTGRES_USER:$$POSTGRES_PASSWORD@db:5432/$$POSTGRES_DB
      REDIS_URL: redis://valkey:6379
      OTEL_EXPORTER_OTLP_ENDPOINT: https://api.axiom.co
      OTEL_EXPORTER_OTLP_HEADERS: Authorization=Bearer $$AXIOM_TOKEN,X-Axiom-Dataset=$$AXIOM_DATASET
      OTEL_SERVICE_NAME: svelte
      OTEL_ENVIRONMENT: development
      NODE_OPTIONS: --max-old-space-size=4096
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:5174/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    depends_on:
      db:
        condition: service_healthy
      valkey:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "2.0"
        reservations:
          memory: 512M
          cpus: "0.5"
    networks:
      - internal

networks:
  internal:
    external: true

volumes:
  db:
  kv:
  deps:
  backups:
    external: true
    name: backups
