services:
  go:
    build:
      context: ../../../apps/go
      dockerfile: Dockerfile
      pull: false
      x-bake:
        provenance: false
    restart: unless-stopped
    volumes:
      - ../../../apps/go:/apps/go
    env_file:
      - ../.env
    environment:
      PORT: 8081
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_SERVICE_NAME: go
      OTEL_ENVIRONMENT: development
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD", "sh", "-lc", "curl -fsS http://localhost:8081/health || exit 1"]
      interval: 10s
      timeout: 2s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - internal

networks:
  internal:
    external: true
