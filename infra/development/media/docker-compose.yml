services:
  image:
    image: darthsim/imgproxy:v3.24.1
    restart: unless-stopped
    # Note: imgproxy needs root for update-ca-certificates in dev (custom certs)
    # Production version runs rootless
    user: "0"
    env_file:
      - ../.env
    environment:
      IMGPROXY_BIND: ":8080"
      IMGPROXY_USE_ETAG: "true"
      IMGPROXY_AUTO_WEBP: "true"
      IMGPROXY_ALLOW_LOOPBACK_SOURCE_ADDRESSES: "true"
      IMGPROXY_USE_S3: "true"
      # Required by S3 protocol, not AWS — MinIO defaults to us-east-1
      AWS_REGION: "us-east-1"
      IMGPROXY_S3_ENDPOINT: "http://object:9000"
    extra_hosts:
      - "dev.habita.rent:host-gateway"
    volumes:
      - ./certs/habita.pem:/usr/local/share/ca-certificates/habita.crt:ro
    command: sh -c "update-ca-certificates && imgproxy"
    healthcheck:
      test: ["CMD", "imgproxy", "health"]
      interval: 10s
      timeout: 5s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "1.0"
        reservations:
          memory: 128M
          cpus: "0.25"
    networks:
      - internal

networks:
  internal:
    external: true
