# Cron jobs using dynamic container discovery via labels
# Uses job-local to run docker exec with label-based container lookup
# This avoids hardcoded container names that break if scaled/renamed

[job-local "create-escalation-jobs"]
schedule = 0 * * * * *
command = docker exec $(docker ps -qf "label=habita.role=app" | head -1) bun run /app/src/lib/server/cron/create_escalation_jobs.script.ts
no-overlap = true

[job-local "process-jobs"]
schedule = 0 * * * * *
command = docker exec $(docker ps -qf "label=habita.role=app" | head -1) bun run /app/src/lib/server/cron/process_jobs.script.ts
no-overlap = true

# Local backup (no remote upload in development)
[job-local "backup-db"]
schedule = 0 0 3 * * *
command = docker exec $(docker ps -qf "label=habita.role=database" | head -1) sh -c 'pg_dump -U "$POSTGRES_USER" -d "$POSTGRES_DB" | gzip > /backups/habita_$(date +%Y%m%d_%H%M%S).sql.gz && find /backups -name "*.sql.gz" -mtime +7 -delete'
no-overlap = true
