# Habita Scheduler Configuration (Development)
# Uses job-exec to run commands directly via docker socket (no docker CLI needed)
# Container names follow: {project}-{service}-{replica}

[job-exec "create-escalation-jobs"]
schedule = 0 * * * * *
container = app-svelte-1
command = pnpm exec tsx /app/src/lib/server/cron/create_escalation_jobs.script.ts
no-overlap = true

[job-exec "create-renewal-jobs"]
schedule = 0 0 8 * * *
container = app-svelte-1
command = pnpm exec tsx /app/src/lib/server/cron/create_renewal_jobs.script.ts
no-overlap = true

# Local backup (no remote upload in development)
[job-exec "backup-db"]
schedule = 0 0 3 * * *
container = storage-db-1
command = sh -c 'pg_dump -U "$POSTGRES_USER" -d "$POSTGRES_DB" | gzip > /backups/habita_$(date +%Y%m%d_%H%M%S).sql.gz && find /backups -name "*.sql.gz" -mtime +7 -delete'
no-overlap = true
