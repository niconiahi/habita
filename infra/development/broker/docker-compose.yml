services:
  redpanda:
    image: redpandadata/redpanda:v24.3.1
    restart: unless-stopped
    labels:
      - "habita.role=broker"
    command:
      - redpanda start
      - --mode dev-container
      - --smp 1
      - --memory 256M
      - --advertise-kafka-addr redpanda:9092
    ports:
      - "9092:9092"
      - "9644:9644"
    volumes:
      - broker:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD", "rpk", "cluster", "health"]
      interval: 15s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 256M
          cpus: "0.25"
    networks:
      - internal

  console:
    image: redpandadata/console:v2.8.1
    restart: unless-stopped
    labels:
      - "habita.role=broker-console"
    environment:
      CONFIG_FILEPATH: ""
      KAFKA_BROKERS: redpanda:9092
      REDPANDA_ADMINAPI_ENABLED: "true"
      REDPANDA_ADMINAPI_URLS: http://redpanda:9644
    ports:
      - "8090:8080"
    depends_on:
      redpanda:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
        reservations:
          memory: 128M
          cpus: "0.1"
    networks:
      - internal

networks:
  internal:
    external: true

volumes:
  broker:
