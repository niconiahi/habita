services:
  nominatim:
    image: mediagis/nominatim:4.4
    hostname: nominatim
    restart: unless-stopped
    ports:
      - "8091:8080/tcp"
    environment:
      - PBF_URL=https://download.geofabrik.de/south-america/argentina-latest.osm.pbf
      - REPLICATION_URL=https://download.geofabrik.de/south-america/argentina-updates/
      - IMPORT_WIKIPEDIA=false
      - IMPORT_US_POSTCODES=false
      - IMPORT_GB_POSTCODES=false
    volumes:
      - nominatim:/var/lib/postgresql/14/main
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/status || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    shm_size: 2gb
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2.0"
        reservations:
          memory: 2G
          cpus: "0.5"
    networks:
      - internal

  tileserver:
    image: maptiler/tileserver-gl:v4.4.7
    command: --public_url https://dev.habita.rent/tiles
    restart: unless-stopped
    ports:
      - "8092:8080/tcp"
    volumes:
      - ./tiles:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
        reservations:
          memory: 256M
          cpus: "0.25"
    networks:
      - internal

networks:
  internal:
    external: true

volumes:
  nominatim:
