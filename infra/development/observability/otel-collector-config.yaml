receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 10s

  # Memory limiter to prevent OOM
  memory_limiter:
    check_interval: 1s
    limit_mib: 400
    spike_limit_mib: 100

exporters:
  logging:
    loglevel: info

  clickhousetraces:
    datasource: tcp://default:signoz_clickhouse_secure_2024@clickhouse:9000/signoz_traces
    low_cardinal_exception_grouping: false

  clickhousemetricswrite:
    endpoint: tcp://default:signoz_clickhouse_secure_2024@clickhouse:9000/signoz_metrics

  clickhouselogsexporter:
    dsn: tcp://default:signoz_clickhouse_secure_2024@clickhouse:9000/signoz_logs
    timeout: 10s

extensions:
  health_check:
    endpoint: 0.0.0.0:13133

service:
  extensions: [health_check]

  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [logging, clickhousetraces]

    metrics:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [logging, clickhousemetricswrite]

    logs:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [logging, clickhouselogsexporter]

  telemetry:
    logs:
      level: info
    metrics:
      address: 0.0.0.0:8888
