services:
  zookeeper-1:
    image: signoz/zookeeper:3.7.1
    container_name: zookeeper-1
    hostname: zookeeper-1
    # Note: ZooKeeper requires root for bitnami image
    user: root
    ports:
      - "2181:2181/tcp"
      - "2888:2888/tcp"
      - "3888:3888/tcp"
    volumes:
      - zookeeper_data:/bitnami/zookeeper
    environment:
      - ZOO_SERVER_ID=1
      - ALLOW_ANONYMOUS_LOGIN=yes
      - ZOO_AUTOPURGE_INTERVAL=1
    healthcheck:
      test: ["CMD-SHELL", "echo srvr | nc localhost 2181 | grep -q Mode"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
        reservations:
          memory: 256M
          cpus: "0.1"
    networks:
      - observability

  clickhouse:
    image: clickhouse/clickhouse-server:24.1.2-alpine
    container_name: clickhouse
    hostname: clickhouse
    restart: on-failure
    tty: true
    depends_on:
      zookeeper-1:
        condition: service_healthy
    ports:
      - "9000:9000"
      - "8123:8123"
      - "9181:9181"
    volumes:
      - ./clickhouse-config.xml:/etc/clickhouse-server/config.xml:ro
      - ./clickhouse-users.xml:/etc/clickhouse-server/users.xml:ro
      - ./custom-function.xml:/etc/clickhouse-server/custom-function.xml:ro
      - ./clickhouse-cluster.xml:/etc/clickhouse-server/config.d/cluster.xml:ro
      - clickhouse_data:/var/lib/clickhouse/
      - clickhouse_logs:/var/log/clickhouse-server/
    logging:
      options:
        max-size: 50m
        max-file: "3"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "0.0.0.0:8123/ping"]
      interval: 30s
      timeout: 5s
      retries: 3
    ulimits:
      nproc: 65535
      nofile:
        soft: 262144
        hard: 262144
    deploy:
      resources:
        limits:
          memory: 2G
    networks:
      - observability

  otel-migrator-sync:
    image: signoz/signoz-schema-migrator:0.111.16
    container_name: otel-migrator-sync
    command: ["sync", "--dsn=tcp://clickhouse:9000", "--up="]
    depends_on:
      clickhouse:
        condition: service_healthy
    networks:
      - observability

  otel-migrator-async:
    image: signoz/signoz-schema-migrator:0.111.16
    container_name: otel-migrator-async
    command: ["async", "--dsn=tcp://clickhouse:9000", "--up="]
    depends_on:
      clickhouse:
        condition: service_healthy
      otel-migrator-sync:
        condition: service_completed_successfully
    networks:
      - observability

  query-service:
    image: signoz/query-service:0.69.0
    container_name: query-service
    restart: on-failure
    command: ["-config=/root/config/prometheus.yml", "--use-logs-new-schema=true", "--use-trace-new-schema=true"]
    volumes:
      - ./prometheus.yml:/root/config/prometheus.yml:ro
      - signoz_data:/var/lib/signoz/
    environment:
      - ClickHouseUrl=tcp://clickhouse:9000
      - STORAGE=clickhouse
      - GODEBUG=netdns=go
      - TELEMETRY_ENABLED=true
      - DEPLOYMENT_TYPE=docker-standalone-amd
      - SIGNOZ_LOCAL_DB_PATH=/var/lib/signoz/signoz.db
    ports:
      - "8080:8080/tcp"
    depends_on:
      clickhouse:
        condition: service_healthy
      otel-migrator-sync:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "localhost:8080/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 256M
          cpus: "0.25"
    networks:
      - observability

  otel-collector:
    image: signoz/signoz-otel-collector:0.111.16
    container_name: otel-collector
    restart: on-failure
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    environment:
      - OTEL_RESOURCE_ATTRIBUTES=host.name=signoz-host,os.type=linux
      - LOW_CARDINAL_EXCEPTION_GROUPING=false
    ports:
      - "4317:4317/tcp"
      - "4318:4318/tcp"
    depends_on:
      clickhouse:
        condition: service_healthy
      otel-migrator-sync:
        condition: service_completed_successfully
      query-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:13133/"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 256M
          cpus: "0.25"
    networks:
      - observability
      - internal

  frontend:
    image: signoz/frontend:0.69.0
    container_name: frontend
    restart: on-failure
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "3301:3301/tcp"
    depends_on:
      query-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3301/"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
        reservations:
          memory: 128M
          cpus: "0.1"
    networks:
      - observability

networks:
  observability:
    driver: bridge
  internal:
    external: true

volumes:
  clickhouse_data:
  clickhouse_logs:
  signoz_data:
  zookeeper_data:
