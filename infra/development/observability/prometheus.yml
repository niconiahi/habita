# Prometheus configuration for Habita observability stack
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    environment: development
    project: habita

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets: []
          # Uncomment when alertmanager is deployed
          # - alertmanager:9093

# Load alerting rules
rule_files:
  - '/root/config/alerts.yml'

# Scrape configurations
scrape_configs:
  # Scrape Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Scrape ClickHouse metrics
  - job_name: 'clickhouse'
    static_configs:
      - targets: ['clickhouse:9363']
    metrics_path: /metrics

  # Scrape OTel Collector metrics
  - job_name: 'otel-collector'
    static_configs:
      - targets: ['otel-collector:8888']
    metrics_path: /metrics

  # Scrape Query Service metrics
  - job_name: 'query-service'
    static_configs:
      - targets: ['query-service:8080']
    metrics_path: /metrics

# Remote read from ClickHouse (SigNoz metrics storage)
remote_read:
  - url: tcp://clickhouse:9000/signoz_metrics
