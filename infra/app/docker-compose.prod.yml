services:
  svelte:
    image: ${SVELTE_IMAGE:?SVELTE_IMAGE required}
    env_file:
      - ../.env.prod
    environment:
      PORT: 3000
      NODE_ENV: production
      OTEL_ENVIRONMENT: production
      PUBLIC_OTEL_ENVIRONMENT: production
      COOKIE_DOMAIN: .habita.rent
      BODY_SIZE_LIMIT: "5242880"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3000/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"
