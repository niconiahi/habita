services:
  svelte:
    build:
      context: ../../apps/web
      dockerfile: Dockerfile
      target: dev
      pull: false
      x-bake:
        provenance: false
    volumes:
      - ../../apps/web:/app:delegated
      - deps:/app/node_modules
      - ../gateway/certs:/certs:ro
      - ../../.git:/app/.git:ro
    env_file:
      - ../.env.dev
    ports:
      - "5174:5174"
    environment:
      PORT: 5174
      OTEL_ENVIRONMENT: development
      PUBLIC_OTEL_ENVIRONMENT: development
      COOKIE_DOMAIN: .dev.habita.rent
      NODE_OPTIONS: --max-old-space-size=1536 --import=file:///app/instrument.mjs
    healthcheck:
      test: ["CMD-SHELL", "node -e \"process.env.NODE_TLS_REJECT_UNAUTHORIZED='0'; fetch('https://localhost:5174/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    labels:
      - "habita.role=tunnel"
    command:
      - tunnel
      - --config
      - /etc/cloudflared/config.yml
      - run
      - habita-dev
    volumes:
      - ../cloudflared/config.yml:/etc/cloudflared/config.yml:ro
      - ${HOME}/.cloudflared/01fd224f-a226-4077-960f-bfd161e6b0a1.json:/etc/cloudflared/credentials.json:ro
    networks:
      - internal
    depends_on:
      svelte:
        condition: service_started

  # E2E test runner
  test:
    image: mcr.microsoft.com/playwright:v1.58.2-noble
    working_dir: /app
    volumes:
      - ../../apps/web:/app:delegated
      - deps:/app/node_modules
    env_file:
      - ../.env.dev
    environment:
      POSTGRES_HOST: db
    extra_hosts:
      - "dev.habita.rent:host-gateway"
    networks:
      - internal
    profiles:
      - test

volumes:
  deps:
