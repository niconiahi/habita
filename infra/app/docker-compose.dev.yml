services:
  svelte:
    build:
      context: ../../apps/web
      dockerfile: Dockerfile
      target: dev
      pull: false
      x-bake:
        provenance: false
    volumes:
      - ../../apps/web:/app:delegated
      - deps:/app/node_modules
      - ../gateway/certs:/certs:ro
    env_file:
      - ../.env.dev
    ports:
      - "5174:5174"
    environment:
      PORT: 5174
      OTEL_ENVIRONMENT: development
      NODE_OPTIONS: --max-old-space-size=1536
    healthcheck:
      test: ["CMD-SHELL", "node -e \"process.env.NODE_TLS_REJECT_UNAUTHORIZED='0'; fetch('https://localhost:5174/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # E2E test runner
  test:
    image: mcr.microsoft.com/playwright:v1.58.2-noble
    working_dir: /app
    volumes:
      - ../../apps/web:/app:delegated
      - deps:/app/node_modules
    env_file:
      - ../.env.dev
    environment:
      POSTGRES_HOST: db
    networks:
      - internal
    profiles:
      - test

volumes:
  deps:
