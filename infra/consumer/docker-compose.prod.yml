services:
  email:
    image: niconiahi/habita:broker-${BROKER_TAG:?BROKER_TAG required}
    env_file:
      - ../.env.prod
    environment:
      NODE_ENV: production
      OTEL_ENVIRONMENT: production

  subscription:
    image: niconiahi/habita:broker-${BROKER_TAG:?BROKER_TAG required}
    env_file:
      - ../.env.prod
    environment:
      NODE_ENV: production
      OTEL_ENVIRONMENT: production
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
        reservations:
          memory: 128M
          cpus: "0.15"

  escalation:
    image: niconiahi/habita:broker-${BROKER_TAG:?BROKER_TAG required}
    env_file:
      - ../.env.prod
    environment:
      NODE_ENV: production
      OTEL_ENVIRONMENT: production
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
        reservations:
          memory: 128M
          cpus: "0.15"
