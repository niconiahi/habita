services:
  email:
    restart: unless-stopped
    labels:
      - "habita.role=consumer-email"
    environment:
      DATABASE_URL: postgres://$$POSTGRES_USER:$$POSTGRES_PASSWORD@db:5432/$$POSTGRES_DB
      REDIS_URL: redis://kv:6379
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_SERVICE_NAME: consumer-email
      BROKER_BROKERS: redpanda:9092
    command: sh -c "pnpm topics && pnpm exec tsx src/consumer/email.script.ts"
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 256M
          cpus: "0.25"
    networks:
      - internal

  subscription:
    restart: unless-stopped
    labels:
      - "habita.role=consumer-subscription"
    environment:
      DATABASE_URL: postgres://$$POSTGRES_USER:$$POSTGRES_PASSWORD@db:5432/$$POSTGRES_DB
      REDIS_URL: redis://kv:6379
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_SERVICE_NAME: consumer-subscription
      BROKER_BROKERS: redpanda:9092
    command: sh -c "pnpm topics && pnpm exec tsx src/consumer/subscription.script.ts"
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    networks:
      - internal

  escalation:
    restart: unless-stopped
    labels:
      - "habita.role=consumer-escalation"
    environment:
      DATABASE_URL: postgres://$$POSTGRES_USER:$$POSTGRES_PASSWORD@db:5432/$$POSTGRES_DB
      REDIS_URL: redis://kv:6379
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_SERVICE_NAME: consumer-escalation
      BROKER_BROKERS: redpanda:9092
    command: sh -c "pnpm topics && pnpm exec tsx src/consumer/escalation.script.ts"
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    networks:
      - internal

networks:
  internal:
    external: true
