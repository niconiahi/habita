services:
  image:
    image: darthsim/imgproxy:v3.24.1
    restart: unless-stopped
    environment:
      IMGPROXY_BIND: ":8080"
      IMGPROXY_USE_ETAG: "true"
      IMGPROXY_AUTO_WEBP: "true"
      IMGPROXY_USE_S3: "true"
      # Required by S3 protocol, not AWS — us-east-1 is the S3 default region
      AWS_REGION: "us-east-1"
      IMGPROXY_S3_ENDPOINT: "http://object:9000"
    healthcheck:
      test: ["CMD", "imgproxy", "health"]
      interval: 10s
      timeout: 5s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    networks:
      - internal

networks:
  internal:
    external: true
