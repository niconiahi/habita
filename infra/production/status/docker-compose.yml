services:
  gatus:
    image: twinproduction/gatus:v5.14.0
    restart: unless-stopped
    labels:
      - "habita.role=status"
    volumes:
      - ./config.yaml:/config/config.yaml:ro
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"
        reservations:
          memory: 64M
          cpus: "0.05"
    networks:
      - internal

networks:
  internal:
    external: true
