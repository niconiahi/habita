storage:
  type: memory

ui:
  title: Habita Status
  header: Habita Services

endpoints:
  # Storage
  - name: db
    group: Storage
    url: "tcp://db:5432"
    interval: 30s
    ui:
      hide-hostname: true
    conditions:
      - "[CONNECTED] == true"

  - name: kv
    group: Storage
    url: "tcp://kv:6379"
    interval: 30s
    ui:
      hide-hostname: true
    conditions:
      - "[CONNECTED] == true"

  - name: object
    group: Storage
    url: "http://object:9000/health"
    interval: 30s
    ui:
      hide-hostname: true
    conditions:
      - "[STATUS] == 200"

  # App
  - name: svelte
    group: App
    url: "http://svelte:3000/health"
    interval: 30s
    ui:
      hide-hostname: true
    conditions:
      - "[STATUS] == 200"
      - "[RESPONSE_TIME] < 2000"

  # API
  - name: go
    group: API
    url: "http://go:8081/health"
    interval: 30s
    ui:
      hide-hostname: true
    conditions:
      - "[STATUS] == 200"

  # Gateway
  - name: caddy
    group: Gateway
    url: "http://caddy:80"
    interval: 30s
    ui:
      hide-hostname: true
    conditions:
      - "[STATUS] < 500"

  # Broker
  - name: redpanda
    group: Broker
    url: "http://redpanda:9644/v1/status/ready"
    interval: 30s
    ui:
      hide-hostname: true
    conditions:
      - "[STATUS] == 200"

  # Media
  - name: image
    group: Media
    url: "http://image:8080/health"
    interval: 30s
    ui:
      hide-hostname: true
    conditions:
      - "[STATUS] == 200"

  # PDF
  - name: pdf
    group: PDF
    url: "http://pdf:8082/health"
    interval: 30s
    ui:
      hide-hostname: true
    conditions:
      - "[STATUS] == 200"

  # Geo
  - name: nominatim
    group: Geo
    url: "http://nominatim:8080/status"
    interval: 60s
    ui:
      hide-hostname: true
    conditions:
      - "[STATUS] == 200"

  - name: tileserver
    group: Geo
    url: "http://tileserver:8080/health"
    interval: 60s
    ui:
      hide-hostname: true
    conditions:
      - "[STATUS] == 200"
