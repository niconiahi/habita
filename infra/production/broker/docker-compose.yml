services:
  redpanda:
    image: redpandadata/redpanda:v24.3.1
    restart: unless-stopped
    labels:
      - "habita.role=broker"
    command:
      - redpanda start
      - --smp 1
      - --memory 512M
      - --advertise-kafka-addr redpanda:9092
    volumes:
      - broker:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD", "rpk", "cluster", "health"]
      interval: 15s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
        reservations:
          memory: 512M
          cpus: "0.25"
    networks:
      - internal

networks:
  internal:
    external: true

volumes:
  broker:
