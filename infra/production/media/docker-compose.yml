services:
  image:
    image: darthsim/imgproxy:v3.24.1
    restart: unless-stopped
    # Run as non-root in production (no custom certs needed)
    user: "1000:1000"
    env_file:
      - ../.env
    environment:
      IMGPROXY_BIND: ":8080"
      IMGPROXY_USE_ETAG: "true"
      IMGPROXY_AUTO_WEBP: "true"
      IMGPROXY_USE_S3: "true"
      # Required by S3 protocol, not AWS — MinIO defaults to us-east-1
      AWS_REGION: "us-east-1"
      IMGPROXY_S3_ENDPOINT: "http://object:9000"
    healthcheck:
      test: ["CMD", "imgproxy", "health"]
      interval: 10s
      timeout: 5s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "2.0"
        reservations:
          memory: 256M
          cpus: "0.5"
    networks:
      - internal

networks:
  internal:
    external: true
