# Cron jobs using dynamic container discovery via labels
# Uses job-local to run docker exec with label-based container lookup
# This avoids hardcoded container names that break if scaled/renamed

[job-local "create-escalation-jobs"]
schedule = 0 * * * * *
command = docker exec $(docker ps -qf "label=habita.role=app" | head -1) bun run /app/app/lib/server/cron/create_escalation_jobs.script.ts
no-overlap = true

[job-local "process-jobs"]
schedule = 0 * * * * *
command = docker exec $(docker ps -qf "label=habita.role=app" | head -1) bun run /app/app/lib/server/cron/process_jobs.script.ts
no-overlap = true

# Backup database with encryption and completion marker
# Flow: pg_dump → gzip → age encrypt → save → cleanup old → create marker
# Uses dedicated backup-worker container with pg_dump and age installed
[job-local "backup-db"]
schedule = 0 0 3 * * *
command = docker exec $(docker ps -qf "label=habita.role=backup-worker" | head -1) sh -c 'BACKUP_FILE="habita_$(date +%Y%m%d_%H%M%S).sql.gz.age" && rm -f /backups/.backup-ready && pg_dump -h db -U "$POSTGRES_USER" -d "$POSTGRES_DB" | gzip | age -r "$AGE_PUBLIC_KEY" > "/backups/$BACKUP_FILE" && find /backups -name "*.sql.gz.age" -mtime +7 -delete && echo "$BACKUP_FILE" > /backups/.backup-ready && echo "Encrypted backup complete: $BACKUP_FILE"'
no-overlap = true

# Upload backups to R2 only if backup is complete (marker exists)
# Removes marker after successful upload
[job-local "backup-upload"]
schedule = 0 15 * * * *
command = docker exec $(docker ps -qf "label=habita.role=backup-uploader" | head -1) sh -c 'if [ -f /backups/.backup-ready ]; then rclone sync /backups r2:habita-backups/postgres --config /config/rclone/rclone.conf --exclude ".backup-ready" && rm /backups/.backup-ready && echo "Upload complete"; else echo "No backup ready, skipping"; fi'
no-overlap = true

# Backup monitoring - alert if no recent backup exists
[job-local "backup-monitor"]
schedule = 0 0 6 * * *
command = docker exec $(docker ps -qf "label=habita.role=backup-uploader" | head -1) sh -c 'LATEST=$(find /backups -name "*.sql.gz.age" -mtime -1 | head -1); if [ -z "$LATEST" ]; then echo "WARNING: No encrypted backup from last 24h" && exit 1; else echo "OK: Found recent backup $LATEST"; fi'
no-overlap = true
