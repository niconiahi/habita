# Habita Scheduler Configuration
# Uses job-exec to run commands directly via docker socket (no docker CLI needed)
# Container names are predictable: {project}-{service}-{replica}

[job-exec "create-escalation-jobs"]
schedule = 0 * * * * *
container = app-svelte-1
command = pnpm exec tsx /app/src/lib/server/cron/create_escalation_jobs.script.ts
no-overlap = true

[job-exec "process-jobs"]
schedule = 0 * * * * *
container = app-svelte-1
command = pnpm exec tsx /app/src/lib/server/cron/process_jobs.script.ts
no-overlap = true

[job-exec "create-renewal-jobs"]
schedule = 0 0 8 * * *
container = app-svelte-1
command = pnpm exec tsx /app/src/lib/server/cron/create_renewal_jobs.script.ts
no-overlap = true

# Backup database with encryption and completion marker
# Flow: pg_dump → gzip → age encrypt → save → cleanup old → create marker
[job-exec "backup-db"]
schedule = 0 0 3 * * *
container = scheduler-backup-worker-1
command = sh -c 'BACKUP_FILE="habita_$(date +%Y%m%d_%H%M%S).sql.gz.age" && rm -f /backups/.backup-ready && pg_dump -h db -U "$POSTGRES_USER" -d "$POSTGRES_DB" | gzip | age -r "$AGE_PUBLIC_KEY" > "/backups/$BACKUP_FILE" && find /backups -name "*.sql.gz.age" -mtime +7 -delete && echo "$BACKUP_FILE" > /backups/.backup-ready && echo "Encrypted backup complete: $BACKUP_FILE"'
no-overlap = true

# Upload backups to R2 only if backup is complete (marker exists)
[job-exec "backup-upload"]
schedule = 0 15 * * * *
container = scheduler-backup-uploader-1
command = sh -c 'if [ -f /backups/.backup-ready ]; then rclone sync /backups r2:habita-backup/postgres --config /config/rclone/rclone.conf --exclude ".backup-ready" && rm /backups/.backup-ready && echo "Upload complete"; else echo "No backup ready, skipping"; fi'
no-overlap = true

# Backup monitoring - alert if no recent backup exists
[job-exec "backup-monitor"]
schedule = 0 0 6 * * *
container = scheduler-backup-uploader-1
command = sh -c 'LATEST=$(find /backups -name "*.sql.gz.age" -mtime -1 | head -1); if [ -z "$LATEST" ]; then echo "WARNING: No encrypted backup from last 24h" && exit 1; else echo "OK: Found recent backup $LATEST"; fi'
no-overlap = true
