services:
  ofelia:
    image: mcuadros/ofelia:0.3.20
    restart: unless-stopped
    labels:
      - "habita.role=scheduler"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./ofelia.ini:/etc/ofelia/config.ini:ro
    command: daemon --config /etc/ofelia/config.ini
    healthcheck:
      test: ["CMD", "pgrep", "-x", "ofelia"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"
        reservations:
          memory: 64M
          cpus: "0.05"
    networks:
      - internal

  # Dedicated backup container with pg_dump and age encryption
  backup-worker:
    build:
      context: .
      dockerfile: Dockerfile.backup
    restart: unless-stopped
    labels:
      - "habita.role=backup-worker"
    env_file:
      - ../.env
    environment:
      # Age public key for encryption (from .sops.yaml)
      AGE_PUBLIC_KEY: ${AGE_PUBLIC_KEY:-age1k9mtnlyx6383ukprf7s8ahc8hzs9ftpdnqa858nkhqpmc5y92s7qgkgzqc}
      PGHOST: db
      PGPORT: 5432
    volumes:
      - backups:/backups
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
        reservations:
          memory: 128M
          cpus: "0.1"
    networks:
      - internal

  backup-uploader:
    image: rclone/rclone:1.68
    restart: unless-stopped
    labels:
      - "habita.role=backup-uploader"
    entrypoint: ["tail", "-f", "/dev/null"]
    volumes:
      - backups:/backups
      - ./rclone.conf:/config/rclone/rclone.conf:ro
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"
        reservations:
          memory: 64M
          cpus: "0.05"
    networks:
      - internal

networks:
  internal:
    external: true

volumes:
  backups:
    external: true
