services:
  db:
    image: postgis/postgis:17-3.4
    restart: unless-stopped
    env_file:
      - ../../../.env.production
    volumes:
      - habita_prod_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G
    networks:
      - habita-network

  app:
    image: niconiahi/habita:web-latest
    restart: unless-stopped
    env_file:
      - ../../../.env.production
    environment:
      PORT: 3000
      NODE_ENV: production
      DATABASE_URL: postgres://$$POSTGRES_USER:$$POSTGRES_PASSWORD@db:5432/$$POSTGRES_DB
      REDIS_URL: redis://valkey:6379
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_SERVICE_NAME: web
      OTEL_ENVIRONMENT: production
    depends_on:
      db:
        condition: service_healthy
      valkey:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 2G
    networks:
      - habita-network
      - observability

  valkey:
    image: valkey/valkey:7
    restart: unless-stopped
    volumes:
      - habita_prod_valkey_data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - habita-network

  go:
    image: niconiahi/habita:go-latest
    restart: unless-stopped
    env_file:
      - ../../../.env.production
    environment:
      PORT: 8081
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_SERVICE_NAME: go
      OTEL_ENVIRONMENT: production
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "sh", "-lc", "curl -fsS http://localhost:8081/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - habita-network
      - observability

  caddy:
    image: caddy:2
    restart: unless-stopped
    depends_on:
      app:
        condition: service_started
      go:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"  # HTTP/3
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - habita_prod_caddy_data:/data
      - habita_prod_caddy_config:/config
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - habita-network

  nominatim:
    image: mediagis/nominatim:4.4
    restart: unless-stopped
    environment:
      - PBF_URL=https://download.geofabrik.de/south-america/argentina-latest.osm.pbf
      - REPLICATION_URL=https://download.geofabrik.de/south-america/argentina-updates/
      - IMPORT_WIKIPEDIA=false
      - IMPORT_US_POSTCODES=false
      - IMPORT_GB_POSTCODES=false
    volumes:
      - habita_prod_nominatim_data:/var/lib/postgresql/14/main
    shm_size: 2gb
    deploy:
      resources:
        limits:
          memory: 8G
        reservations:
          memory: 4G
    networks:
      - habita-network

  ofelia:
    image: mcuadros/ofelia:latest
    restart: unless-stopped
    depends_on:
      app:
        condition: service_started
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./ofelia.ini:/etc/ofelia/config.ini:ro
    command: daemon --config /etc/ofelia/config.ini
    deploy:
      resources:
        limits:
          memory: 128M
    networks:
      - habita-network

  image:
    image: darthsim/imgproxy:latest
    restart: unless-stopped
    env_file:
      - ../../../.env.production
    environment:
      IMGPROXY_BIND: ":8080"
      IMGPROXY_USE_ETAG: "true"
      IMGPROXY_AUTO_WEBP: "true"
    depends_on:
      app:
        condition: service_started
    healthcheck:
      test: ["CMD", "imgproxy", "health"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - habita-network

volumes:
  habita_prod_db_data:
  habita_prod_valkey_data:
  habita_prod_nominatim_data:
  habita_prod_caddy_data:
  habita_prod_caddy_config:

networks:
  habita-network:
    driver: bridge
