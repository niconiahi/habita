      OTEL_EXPORTER_OTLP_ENDPOINT: https://api.axiom.co
      OTEL_EXPORTER_OTLP_HEADERS: Authorization=Bearer $$AXIOM_TOKEN,X-Axiom-Dataset=$$AXIOM_DATASET
