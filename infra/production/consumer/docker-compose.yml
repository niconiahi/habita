    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
        reservations:
          memory: 128M
          cpus: "0.15"
    networks:
      - internal

  escalation:
    image: niconiahi/habita:svelte-${SVELTE_TAG:?SVELTE_TAG required}
    restart: unless-stopped
    env_file:
      - ../.env
    labels:
      - "habita.role=consumer-escalation"
    environment:
