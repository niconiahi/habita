services:
  svelte:
    image: niconiahi/habita:svelte-${SVELTE_TAG:?SVELTE_TAG required}
    restart: unless-stopped
    env_file:
      - ../.env
    labels:
      - "habita.role=app"
    environment:
      PORT: 3000
      NODE_ENV: production
      DATABASE_URL: postgres://$$POSTGRES_USER:$$POSTGRES_PASSWORD@db:5432/$$POSTGRES_DB
      REDIS_URL: redis://kv:6379
      OTEL_EXPORTER_OTLP_ENDPOINT: https://api.axiom.co
      OTEL_EXPORTER_OTLP_HEADERS: Authorization=Bearer $$AXIOM_TOKEN,X-Axiom-Dataset=$$AXIOM_DATASET
      OTEL_SERVICE_NAME: svelte
      OTEL_ENVIRONMENT: production
      BROKER_BROKERS: redpanda:9092
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3000/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
        reservations:
          memory: 1G
          cpus: "0.5"
    networks:
      - internal

networks:
  internal:
    external: true
