services:
  db:
    image: postgis/postgis:17-3.4
    restart: unless-stopped
    env_file:
      - ../.env
    labels:
      - "habita.role=database"
    volumes:
      - db:/var/lib/postgresql/data
      - backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G
    networks:
      - internal

  valkey:
    image: valkey/valkey:7
    restart: unless-stopped
    labels:
      - "habita.role=cache"
    volumes:
      - kv:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - internal

  svelte:
    image: niconiahi/habita:svelte-${IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file:
      - ../.env
    labels:
      - "habita.role=app"
    environment:
      PORT: 3000
      NODE_ENV: production
      DATABASE_URL: postgres://$$POSTGRES_USER:$$POSTGRES_PASSWORD@db:5432/$$POSTGRES_DB
      REDIS_URL: redis://valkey:6379
      OTEL_EXPORTER_OTLP_ENDPOINT: https://api.axiom.co
      OTEL_EXPORTER_OTLP_HEADERS: Authorization=Bearer $$AXIOM_TOKEN,X-Axiom-Dataset=$$AXIOM_DATASET
      OTEL_SERVICE_NAME: svelte
      OTEL_ENVIRONMENT: production
    depends_on:
      db:
        condition: service_healthy
      valkey:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 2G
    networks:
      - internal

networks:
  internal:
    external: true

volumes:
  db:
  kv:
  backups:
