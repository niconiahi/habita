services:
  go:
    image: niconiahi/habita:go-${IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      PORT: 8081
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_SERVICE_NAME: go
      OTEL_ENVIRONMENT: production
    healthcheck:
      test: ["CMD", "sh", "-lc", "curl -fsS http://localhost:8081/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 10
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 256M
          cpus: "0.25"
    networks:
      - internal

networks:
  internal:
    external: true
