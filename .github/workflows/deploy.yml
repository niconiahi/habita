name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and push web app image
        run: |
          docker build \
            -f infra/production/web/Dockerfile \
            -t niconiahi/habita:web-latest \
            -t niconiahi/habita:web-${{ github.sha }} \
            apps/web
          docker push niconiahi/habita:web-latest
          docker push niconiahi/habita:web-${{ github.sha }}

      - name: Build and push Go service image
        run: |
          docker build \
            -f apps/go/Dockerfile \
            -t niconiahi/habita:go-latest \
            -t niconiahi/habita:go-${{ github.sha }} \
            apps/go
          docker push niconiahi/habita:go-latest
          docker push niconiahi/habita:go-${{ github.sha }}

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            cd /opt/habita

            echo "=== Pulling latest code ==="
            git fetch origin main
            git reset --hard origin/main

            echo ""
            echo "=== Logging into Docker Hub ==="
            echo "${{ secrets.DOCKER_HUB_TOKEN }}" | docker login -u "${{ secrets.DOCKER_HUB_USERNAME }}" --password-stdin

            echo ""
            echo "=== Pulling latest images ==="
            docker compose -f infra/production/docker-compose.yml pull web go

            echo ""
            echo "=== Running migrations ==="
            docker compose -f infra/production/docker-compose.yml run --rm web npx kysely migrate:latest

            echo ""
            echo "=== Restarting containers ==="
            docker compose -f infra/production/docker-compose.yml up -d --force-recreate caddy
            docker compose -f infra/production/docker-compose.yml up -d

            echo ""
            echo "=== Deployment complete ==="
            docker compose -f infra/production/docker-compose.yml ps
