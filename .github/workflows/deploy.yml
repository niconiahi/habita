name: Build Images

run-name: ${{ github.head_ref }}

on:
  pull_request:
    types: [closed]
    branches: [main]
    paths:
      - 'apps/web/**'
      - 'apps/go/**'
      - 'apps/broker/**'
      - 'apps/observability/**'
      - 'infra/observability/**'

env:
  REGISTRY: docker.io
  IMAGE_PREFIX: niconiahi/habita
  MERGE_SHA: ${{ github.event.pull_request.merge_commit_sha }}

jobs:
  changes:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      app: ${{ steps.filter.outputs.app }}
      api: ${{ steps.filter.outputs.api }}
      broker: ${{ steps.filter.outputs.broker }}
      observability: ${{ steps.filter.outputs.observability }}
      otel_collector: ${{ steps.filter.outputs.otel_collector }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            app:
              - 'apps/web/**'
            api:
              - 'apps/go/**'
            broker:
              - 'apps/broker/**'
            observability:
              - 'apps/observability/**'
            otel_collector:
              - 'infra/observability/**'

  build-svelte:
    needs: changes
    if: needs.changes.outputs.app == 'true'
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.image.outputs.digest }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ./apps/web
          file: ./apps/web/Dockerfile
          target: production
          push: true
          tags: ${{ env.IMAGE_PREFIX }}:svelte-${{ env.MERGE_SHA }}
          build-args: |
            COMMIT_SHA=${{ env.MERGE_SHA }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Set image output
        id: image
        run: echo "digest=${{ steps.build.outputs.digest }}" >> "$GITHUB_OUTPUT"

  build-go:
    needs: changes
    if: needs.changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.image.outputs.digest }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ./apps/go
          file: ./apps/go/Dockerfile
          push: true
          tags: ${{ env.IMAGE_PREFIX }}:go-${{ env.MERGE_SHA }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Set image output
        id: image
        run: echo "digest=${{ steps.build.outputs.digest }}" >> "$GITHUB_OUTPUT"

  build-broker:
    needs: changes
    if: needs.changes.outputs.broker == 'true'
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.image.outputs.digest }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ./apps/broker
          file: ./apps/broker/config/Dockerfile
          push: true
          tags: ${{ env.IMAGE_PREFIX }}:broker-${{ env.MERGE_SHA }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Set image output
        id: image
        run: echo "digest=${{ steps.build.outputs.digest }}" >> "$GITHUB_OUTPUT"

  build-observability:
    needs: changes
    if: needs.changes.outputs.observability == 'true'
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.image.outputs.digest }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ./apps/observability
          file: ./apps/observability/Dockerfile
          target: production
          push: true
          tags: ${{ env.IMAGE_PREFIX }}:observability-${{ env.MERGE_SHA }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Set image output
        id: image
        run: echo "digest=${{ steps.build.outputs.digest }}" >> "$GITHUB_OUTPUT"

  build-otel-collector:
    needs: changes
    if: needs.changes.outputs.otel_collector == 'true'
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.image.outputs.digest }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ./infra/observability
          file: ./infra/observability/Dockerfile.otel-collector
          push: true
          tags: ${{ env.IMAGE_PREFIX }}:otel-collector-${{ env.MERGE_SHA }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Set image output
        id: image
        run: echo "digest=${{ steps.build.outputs.digest }}" >> "$GITHUB_OUTPUT"

  update-manifest:
    needs: [build-svelte, build-go, build-broker, build-observability, build-otel-collector]
    if: always() && !cancelled() && github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Update versions.json
        run: |
          SVELTE_DIGEST="${{ needs.build-svelte.outputs.digest }}"
          GO_DIGEST="${{ needs.build-go.outputs.digest }}"
          BROKER_DIGEST="${{ needs.build-broker.outputs.digest }}"
          OBSERVABILITY_DIGEST="${{ needs.build-observability.outputs.digest }}"
          OTEL_COLLECTOR_DIGEST="${{ needs.build-otel-collector.outputs.digest }}"

          SVELTE_IMAGE="${SVELTE_DIGEST:+${IMAGE_PREFIX}@${SVELTE_DIGEST}}"
          GO_IMAGE="${GO_DIGEST:+${IMAGE_PREFIX}@${GO_DIGEST}}"
          BROKER_IMAGE="${BROKER_DIGEST:+${IMAGE_PREFIX}@${BROKER_DIGEST}}"
          OBSERVABILITY_IMAGE="${OBSERVABILITY_DIGEST:+${IMAGE_PREFIX}@${OBSERVABILITY_DIGEST}}"
          OTEL_COLLECTOR_IMAGE="${OTEL_COLLECTOR_DIGEST:+${IMAGE_PREFIX}@${OTEL_COLLECTOR_DIGEST}}"

          if [[ -n "$SVELTE_IMAGE" ]]; then
            jq --arg v "$SVELTE_IMAGE" '.svelte = $v' infra/manifest.json > tmp.json && mv tmp.json infra/manifest.json
          fi
          if [[ -n "$GO_IMAGE" ]]; then
            jq --arg v "$GO_IMAGE" '.go = $v' infra/manifest.json > tmp.json && mv tmp.json infra/manifest.json
          fi
          if [[ -n "$BROKER_IMAGE" ]]; then
            jq --arg v "$BROKER_IMAGE" '.broker = $v' infra/manifest.json > tmp.json && mv tmp.json infra/manifest.json
          fi
          if [[ -n "$OBSERVABILITY_IMAGE" ]]; then
            jq --arg v "$OBSERVABILITY_IMAGE" '.observability = $v' infra/manifest.json > tmp.json && mv tmp.json infra/manifest.json
          fi
          if [[ -n "$OTEL_COLLECTOR_IMAGE" ]]; then
            jq --arg v "$OTEL_COLLECTOR_IMAGE" '.otel_collector = $v' infra/manifest.json > tmp.json && mv tmp.json infra/manifest.json
          fi

          echo "Updated versions.json:"
          cat infra/manifest.json

      - name: Commit manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add infra/manifest.json
          git diff --cached --quiet && echo "no changes" && exit 0
          git commit -m "chore(deploy): update image manifest [skip ci]"
          git push
