name: Build Images

on:
  push:
    branches: [main]
    paths:
      - 'apps/web/**'
      - 'apps/go/**'
      - 'apps/broker/**'

env:
  REGISTRY: docker.io
  IMAGE_PREFIX: niconiahi/habita

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      app: ${{ steps.filter.outputs.app }}
      api: ${{ steps.filter.outputs.api }}
      broker: ${{ steps.filter.outputs.broker }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            app:
              - 'apps/web/**'
            api:
              - 'apps/go/**'
            broker:
              - 'apps/broker/**'

  build-svelte:
    needs: changes
    if: needs.changes.outputs.app == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./apps/web
          file: ./apps/web/Dockerfile
          target: production
          push: true
          tags: ${{ env.IMAGE_PREFIX }}:svelte-${{ github.sha }}
          build-args: |
            COMMIT_SHA=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-go:
    needs: changes
    if: needs.changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./apps/go
          file: ./apps/go/Dockerfile
          push: true
          tags: ${{ env.IMAGE_PREFIX }}:go-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-broker:
    needs: changes
    if: needs.changes.outputs.broker == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./apps/broker
          file: ./apps/broker/config/Dockerfile
          push: true
          tags: ${{ env.IMAGE_PREFIX }}:broker-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
