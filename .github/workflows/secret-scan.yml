name: Secret Scan

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - name: Skip if commit came from a merged PR
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pr=$(gh api repos/${{ github.repository }}/commits/${{ github.sha }}/pulls --jq '.[0].merged_at // empty')
          if [[ -n "$pr" ]]; then
            echo "commit ${{ github.sha }} merged via PR — skipping"
            echo "SKIP=true" >> $GITHUB_ENV
          fi
      - uses: actions/checkout@v4
        if: env.SKIP != 'true'
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        if: env.SKIP != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
