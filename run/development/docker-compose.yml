services:
  db:
    image: postgis/postgis:17-3.4
    env_file:
      - ../../.env
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: ../../
      dockerfile: run/development/app/Dockerfile
    env_file:
      - ../../.env
    environment:
      NODE_ENV: development
      SERVERDEV: true
      PORT: 5173
      DATABASE_URL: postgres://$$POSTGRES_USER:$$POSTGRES_PASSWORD@db:5432/$$POSTGRES_DB
    ports:
      - "5173:5173"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5173/"]
      interval: 10s
      timeout: 2s
      retries: 10

  go:
    build:
      context: ../../
      dockerfile: run/development/go/Dockerfile
    env_file:
      - ../../.env
    environment:
      PORT: 8081
    depends_on:
      db:
        condition: service_healthy
      app:
        condition: service_healthy
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD", "sh", "-lc", "curl -fsS http://localhost:8081/health || exit 1"]
      interval: 10s
      timeout: 2s
      retries: 10

  caddy:
    image: caddy:2
    depends_on:
      go:
        condition: service_healthy
    ports:
      - "80:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro

volumes:
  pgdata:
