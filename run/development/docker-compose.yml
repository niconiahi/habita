services:
  db:
    image: postgis/postgis:17-3.4
    restart: unless-stopped
    env_file:
      - ../../.env
    volumes:
      - memudo_app_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  app:
    build:
      context: ../../
      dockerfile: run/development/app/Dockerfile
    restart: unless-stopped
    volumes:
      - ../../:/app
      - /app/node_modules
    env_file:
      - ../../.env
    ports:
      - "5173:5173"
    environment:
      PORT: 5173
      DATABASE_URL: postgres://$$POSTGRES_USER:$$POSTGRES_PASSWORD@db:5432/$$POSTGRES_DB
    depends_on:
      db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1G

  go:
    build:
      context: ../../
      dockerfile: run/development/go/Dockerfile
    restart: unless-stopped
    env_file:
      - ../../.env
    environment:
      PORT: 8081
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD", "sh", "-lc", "curl -fsS http://localhost:8081/health || exit 1"]
      interval: 10s
      timeout: 2s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 256M

  caddy:
    image: caddy:2
    restart: unless-stopped
    depends_on:
      go:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./dev.memudo.rent+1.pem:/etc/ssl/certs/dev.memudo.rent+1.pem:ro
      - ./dev.memudo.rent+1-key.pem:/etc/ssl/private/dev.memudo.rent+1-key.pem:ro
    deploy:
      resources:
        limits:
          memory: 128M


volumes:
  memudo_app_data:
