services:
  db:
    image: postgis/postgis:17-3.4
    restart: unless-stopped
    env_file:
      - ../../.env
    ports:
      - "5432:5432"
    volumes:
      - memudo_app_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  app:
    build:
      context: ../../
      dockerfile: run/development/app/Dockerfile
    restart: unless-stopped
    volumes:
      - ../../:/app
      - memudo_app_deps:/app/node_modules
    env_file:
      - ../../.env
    ports:
      - "5173:5173"
    environment:
      PORT: 5173
      DATABASE_URL: postgres://$$POSTGRES_USER:$$POSTGRES_PASSWORD@db:5432/$$POSTGRES_DB
      REDIS_URL: redis://valkey:6379
    depends_on:
      db:
        condition: service_healthy
      valkey:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1G

  valkey:
    image: valkey/valkey:7
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - memudo_valkey_data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M

  go:
    build:
      context: ../../
      dockerfile: run/development/go/Dockerfile
    restart: unless-stopped
    env_file:
      - ../../.env
    environment:
      PORT: 8081
      SMTP_HOST: smtp
      SMTP_PORT: "25"
    depends_on:
      db:
        condition: service_healthy
      smtp:
        condition: service_started
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD", "sh", "-lc", "curl -fsS http://localhost:8081/health || exit 1"]
      interval: 10s
      timeout: 2s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 256M

  caddy:
    image: caddy:2
    restart: unless-stopped
    depends_on:
      go:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./dev.memudo.rent+1.pem:/etc/ssl/certs/dev.memudo.rent+1.pem:ro
      - ./dev.memudo.rent+1-key.pem:/etc/ssl/private/dev.memudo.rent+1-key.pem:ro
    deploy:
      resources:
        limits:
          memory: 128M

  nominatim:
    image: mediagis/nominatim:4.4
    container_name: nominatim
    ports:
      - "8080:8080"
    environment:
      - PBF_URL=https://download.geofabrik.de/south-america/argentina-latest.osm.pbf
      - REPLICATION_URL=https://download.geofabrik.de/south-america/argentina-updates/
      - IMPORT_WIKIPEDIA=false
      - IMPORT_US_POSTCODES=false
      - IMPORT_GB_POSTCODES=false
    volumes:
      - memudo_nominatim_data:/var/lib/postgresql/14/main
    shm_size: 1gb
    deploy:
      resources:
        limits:
          memory: 8G
        reservations:
          memory: 4G

  smtp:
    image: namshi/smtp
    restart: unless-stopped
    environment:
      - RELAY_NETWORKS=:172.0.0.0/8
    ports:
      - "25:25"
    deploy:
      resources:
        limits:
          memory: 64M

volumes:
  memudo_app_data:
  memudo_app_deps:
  memudo_nominatim_data:
  memudo_valkey_data:
